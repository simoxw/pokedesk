  <title>Pokedesk</title>

  <link rel="manifest" href="/pokedesk/manifest.json" />
  <meta name="theme-color" content="#0f0f1a" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Pokedesk" />
  <link rel="apple-touch-icon" href="/pokedesk/icon-512.png" />

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        // IMPORTANTE: il percorso deve includere /pokedesk/
        navigator.serviceWorker.register('/pokedesk/sw.js')
          .then(reg => console.log('PWA Registrata con successo!', reg.scope))
          .catch(err => console.error('Errore registrazione PWA:', err));
      });
    }
  </script>
  <script type="module" crossorigin src="/pokedesk/assets/index-D_sUSmUm.js"></script>
  <link rel="stylesheet" crossorigin href="/pokedesk/assets/index-B9SsSSZr.css">
</head>
